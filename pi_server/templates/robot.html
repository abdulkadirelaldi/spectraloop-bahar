<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AKGYS · Spectra</title>
<script src="/static/socket.io.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#020810;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'Segoe UI',system-ui,Arial,sans-serif;
}

#container{
  display:flex;flex-direction:column;
  align-items:center;gap:20px;
}

/* ── KARAKTER ── */
#face-wrap{
  position:relative;
  width:340px;height:340px;
  display:flex;align-items:center;justify-content:center;
}

#spectra-img{
  width:320px;height:320px;
  object-fit:contain;
  border-radius:50%;
  transition:filter 0.5s ease, transform 0.4s ease;
  filter: drop-shadow(0 0 18px rgba(95,179,255,0.35))
          brightness(1.0);
}

/* Durum animasyonları */
#spectra-img.listening{
  filter: drop-shadow(0 0 32px rgba(46,204,113,0.70))
          drop-shadow(0 0 12px rgba(46,204,113,0.50))
          brightness(1.15);
  animation: listen-pulse 1.2s ease-in-out infinite;
}
#spectra-img.thinking{
  filter: drop-shadow(0 0 28px rgba(255,217,77,0.65))
          drop-shadow(0 0 10px rgba(255,217,77,0.40))
          brightness(1.10);
  animation: think-pulse 1.8s ease-in-out infinite;
}
#spectra-img.speaking{
  filter: drop-shadow(0 0 36px rgba(95,179,255,0.80))
          drop-shadow(0 0 14px rgba(122,212,255,0.55))
          brightness(1.20);
  animation: speak-bounce 0.35s ease-in-out infinite alternate;
}

@keyframes listen-pulse{
  0%,100%{ transform: scale(1.00); }
  50%    { transform: scale(1.04); }
}
@keyframes think-pulse{
  0%,100%{ transform: scale(1.00); opacity:1; }
  50%    { transform: scale(1.02); opacity:0.88; }
}
@keyframes speak-bounce{
  from{ transform: scale(1.00) translateY(0px); }
  to  { transform: scale(1.03) translateY(-5px); }
}

/* Outer pulse ring */
#pulse-ring{
  position:absolute;inset:-18px;
  border-radius:50%;
  border:2.5px solid transparent;
  transition:border-color 0.5s, box-shadow 0.5s;
  pointer-events:none;
}
#pulse-ring.listening{
  border-color:rgba(46,204,113,0.50);
  box-shadow:0 0 30px rgba(46,204,113,0.22), inset 0 0 20px rgba(46,204,113,0.08);
  animation:ring-spin 3s linear infinite;
}
#pulse-ring.thinking{
  border-color:rgba(255,217,77,0.45);
  box-shadow:0 0 28px rgba(255,217,77,0.20);
  animation:ring-spin 2s linear infinite reverse;
}
#pulse-ring.speaking{
  border-color:rgba(95,179,255,0.65);
  box-shadow:0 0 36px rgba(95,179,255,0.26), inset 0 0 24px rgba(95,179,255,0.08);
  animation:ring-spin 1.2s linear infinite;
}
@keyframes ring-spin{
  from{transform:rotate(0deg);}
  to  {transform:rotate(360deg);}
}

/* Sound wave canvas (konuşurken) */
#wave-canvas{
  position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);
  pointer-events:none;
  opacity:0;transition:opacity 0.3s;
}
#wave-canvas.visible{ opacity:1; }

/* ── DURUM ETIKETI ── */
#state-lbl{
  font-size:14px;font-weight:700;letter-spacing:3.5px;
  text-transform:uppercase;color:#5fb3ff;
  transition:color 0.4s;
  text-shadow:0 0 18px currentColor;
}

/* ── KONUŞMA METNİ ── */
#speech-text{
  font-size:15px;color:#3a6080;
  text-align:center;line-height:1.6;
  max-width:400px;min-height:24px;
  transition:color 0.3s, opacity 0.3s;
  padding:0 10px;
}

/* Thinking dots */
#think-dots{
  display:none;gap:8px;align-items:center;justify-content:center;
}
#think-dots.visible{display:flex;}
.t-dot{
  width:10px;height:10px;border-radius:50%;
  background:rgba(255,217,77,0.3);
  animation:dot-flash 1.4s ease-in-out infinite;
}
.t-dot:nth-child(2){animation-delay:0.2s;}
.t-dot:nth-child(3){animation-delay:0.4s;}
@keyframes dot-flash{
  0%,80%,100%{background:rgba(255,217,77,0.20);transform:scale(0.8);}
  40%        {background:rgba(255,217,77,0.90);transform:scale(1.2);}
}

/* ── ÜST ETIKET ── */
#akgys-lbl{
  position:fixed;top:18px;left:0;right:0;text-align:center;
  font-size:10px;letter-spacing:3px;color:#1a3050;text-transform:uppercase;
}
</style>
</head>
<body>

<div id="akgys-lbl">AKGYS · SPECTRA AI</div>

<div id="container">

  <div id="face-wrap">
    <img id="spectra-img" src="/static/spectra.svg" alt="Spectra">
    <div id="pulse-ring"></div>
    <canvas id="wave-canvas" width="320" height="48"></canvas>
  </div>

  <div id="state-lbl">BEKLEME</div>

  <div id="think-dots">
    <div class="t-dot"></div>
    <div class="t-dot"></div>
    <div class="t-dot"></div>
  </div>

  <div id="speech-text">Spectraloop diyerek başlayın…</div>

</div>

<script>
const img       = document.getElementById('spectra-img');
const ring      = document.getElementById('pulse-ring');
const stateLbl  = document.getElementById('state-lbl');
const speechTxt = document.getElementById('speech-text');
const thinkDots = document.getElementById('think-dots');
const waveCanvas= document.getElementById('wave-canvas');
const waveCtx   = waveCanvas.getContext('2d');

let currentState = 'idle';
let waveFrame    = 0;
let waveAnim     = null;

const CFG = {
  idle:      {lbl:'BEKLEME',    color:'#5fb3ff', tc:'rgba(95,179,255,0.65)'},
  listening: {lbl:'DİNLİYOR',  color:'#2ecc71', tc:'rgba(46,204,113,0.75)'},
  thinking:  {lbl:'DÜŞÜNÜYOR', color:'#ffd94d', tc:'rgba(255,217,77,0.75)'},
  speaking:  {lbl:'KONUŞUYOR', color:'#7ad4ff', tc:'rgba(122,212,255,0.75)'},
};

function setState(s, text){
  currentState = s;
  const c = CFG[s] || CFG.idle;

  /* Image class */
  img.className  = s !== 'idle' ? s : '';
  ring.className = s !== 'idle' ? s : '';

  /* Label */
  stateLbl.textContent  = c.lbl;
  stateLbl.style.color  = c.color;

  /* Speech text */
  if(text)               speechTxt.textContent = text;
  else if(s==='idle')    speechTxt.textContent = 'Spectraloop diyerek başlayın…';
  else if(s==='listening') speechTxt.textContent = 'Sizi dinliyorum…';
  else if(s==='thinking')  speechTxt.textContent = 'Düşünüyorum…';
  speechTxt.style.color = c.tc;

  /* Thinking dots */
  thinkDots.className = s === 'thinking' ? 'visible' : '';

  /* Wave canvas */
  if(s === 'speaking'){
    waveCanvas.classList.add('visible');
    if(!waveAnim) drawWave();
  } else {
    waveCanvas.classList.remove('visible');
    if(waveAnim){ cancelAnimationFrame(waveAnim); waveAnim=null; }
  }
}

/* Sound wave animation under the character */
function drawWave(){
  const W = waveCanvas.width, H = waveCanvas.height;
  waveCtx.clearRect(0,0,W,H);

  const bars = 28;
  const bw   = W / bars;
  for(let i=0;i<bars;i++){
    const h = 6 + 20*Math.abs(Math.sin(waveFrame*0.18 + i*0.42));
    const a = 0.25 + 0.45*Math.abs(Math.sin(waveFrame*0.14 + i*0.55));
    waveCtx.fillStyle = `rgba(122,212,255,${a})`;
    waveCtx.beginPath();
    waveCtx.roundRect(i*bw+1, H/2-h/2, bw-3, h, 3);
    waveCtx.fill();
  }
  waveFrame++;
  waveAnim = requestAnimationFrame(drawWave);
}

/* SocketIO */
const socket = io();
socket.on('assistant_state', d => {
  setState(d.state || 'idle', d.text || '');
});

socket.on('connect',    ()=>{ console.log('Pi bağlı'); });
socket.on('disconnect', ()=>{ setState('idle',''); });
</script>
</body>
</html>

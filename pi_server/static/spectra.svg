<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="Spectra AI">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%"  stop-color="#0e2a4a"/>
      <stop offset="60%" stop-color="#071a30"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#7ad4ff"/>
      <stop offset="50%" stop-color="#5fb3ff"/>
      <stop offset="100%" stop-color="#2e6cff"/>
    </linearGradient>
    <radialGradient id="eye" cx="50%" cy="45%" r="60%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#bfeaff"/>
      <stop offset="100%" stop-color="#5fb3ff"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Zemin -->
  <circle cx="160" cy="160" r="156" fill="url(#bg)"/>
  <circle cx="160" cy="160" r="150" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.85"/>
  <circle cx="160" cy="160" r="140" fill="none" stroke="#5fb3ff" stroke-width="1" opacity="0.20"/>

  <!-- Baş / yüz paneli -->
  <rect x="86" y="92" width="148" height="128" rx="42" fill="#0a1e38" stroke="url(#ring)" stroke-width="2.5" opacity="0.95"/>
  <rect x="86" y="92" width="148" height="128" rx="42" fill="none" stroke="#7ad4ff" stroke-width="1" opacity="0.25"/>

  <!-- Gözler -->
  <g filter="url(#glow)">
    <ellipse cx="132" cy="150" rx="16" ry="20" fill="url(#eye)"/>
    <ellipse cx="188" cy="150" rx="16" ry="20" fill="url(#eye)"/>
  </g>
  <circle cx="132" cy="150" r="5" fill="#0a1e38" opacity="0.55"/>
  <circle cx="188" cy="150" r="5" fill="#0a1e38" opacity="0.55"/>

  <!-- Ağız / ses dalgası -->
  <g stroke="#7ad4ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)">
    <line x1="138" y1="188" x2="138" y2="188"/>
    <line x1="150" y1="184" x2="150" y2="192"/>
    <line x1="160" y1="181" x2="160" y2="195"/>
    <line x1="170" y1="184" x2="170" y2="192"/>
    <line x1="182" y1="188" x2="182" y2="188"/>
  </g>

  <!-- Anten -->
  <line x1="160" y1="92" x2="160" y2="72" stroke="url(#ring)" stroke-width="3"/>
  <circle cx="160" cy="68" r="6" fill="#7ad4ff" filter="url(#glow)"/>

  <!-- Yan işaretler -->
  <circle cx="70" cy="160" r="4" fill="#5fb3ff" opacity="0.6"/>
  <circle cx="250" cy="160" r="4" fill="#5fb3ff" opacity="0.6"/>
</svg>
